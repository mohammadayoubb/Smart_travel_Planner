services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-travel-postgres
    environment:
      POSTGRES_DB: smart_travel
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: smart_password
    ports:
      - "5432:5432"
    volumes:
      - smart_travel_postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: smart-travel-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: smart-travel-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  smart_travel_postgres_data: